server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # Limit request body size — there is no upload endpoint, so keep it tiny.
    client_max_body_size 64k;

    # Security headers (added on every response, including error pages)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Gzip
    gzip               on;
    gzip_vary          on;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_types         text/plain text/css text/javascript application/javascript application/json image/svg+xml font/ttf font/otf;

    # Hashed build assets — safe to cache for a year.
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Static assets (favicon, images): short cache, must-revalidate.
    location ~* \.(?:ico|svg|png|jpe?g|webp|gif|woff2?|ttf|otf)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate" always;
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback — every unknown path serves index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files (e.g. .git, .env) from ever being served.
    location ~ /\. {
        deny all;
        return 404;
    }

    # Disable serving of source-map files in production if any leak in.
    location ~* \.map$ {
        deny all;
        return 404;
    }
}
